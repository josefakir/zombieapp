<div data-page="register" class="page ">
  <div class="navbar header">
    <div class="navbar-inner">
      <div class="left sliding"><a href="index.html" class="link icon-only"><i class="fa fa-chevron-left"></i></a></div>
      </div>
  </div>
  <div class="page-content hide-bars-on-scroll" >
    <div class="loginsimag row"><img  src="img/icon.png" alt=""></div>
      <div class="clear"></div>
      <form id="formregistro" class="formregistro" enctype="multipart/form-data" >
      <div class="list-block">
        <ul>
          <li>
            <div class="item-content">
              <div class="item-inner">
                <div class="item-title  label">Correo</div>
                <div class="item-input">
                  <input type="email" placeholder="" id="input_email" name="correo" />
                </div>
              </div>
            </div>
          </li>
          <li>
            <div class="item-content">
              <div class="item-inner">
                <div class="item-title  label">Contraseña</div>
                <div class="item-input">
                  <input type="password" placeholder="" id="input_contra" name="contrasena" />
                </div>
              </div>
            </div>
          </li>
          <li>
            <div class="item-content">
              <div class="item-inner">
                <div class="item-title  label">Nombre(s)</div>
                <div class="item-input">
                  <input type="text" placeholder="" id="input_nombre" name="nombre" />
                </div>
              </div>
            </div>
          </li>
          <li>
            <div class="item-content">
              <div class="item-inner">
                <div class="item-title  label">A. Paterno</div>
                <div class="item-input">
                  <input type="text" placeholder="" id="input_paterno" name="paterno" />
                </div>
              </div>
            </div>
          </li>
          <li>
            <div class="item-content">
              <div class="item-inner">
                <div class="item-title  label">A. Materno</div>
                <div class="item-input">
                  <input type="text" placeholder="" id="input_materno" name="materno" />
                </div>
              </div>
            </div>
          </li>
          <li>
            <div class="item-content">
              <div class="item-inner">
                <div class="item-title label">Foto de perfil</div>
                <div class="item-input">
                  <input type="file" placeholder="Foto de perfil" id="input_foto" name="avatar" />
                </div>
              </div>
            </div>
          </li>
        </ul>
      </div>
      </form>
      <div class="content-block">
        <div class="list-block-label">Al hacer click en registrarme, acepta los términos y condiciones</div>
      </div>
      <br><br><br>
      <div class="buttonbar row no-gutter">
            <a href="#" class=" button  color2 col-100" id="btn_registrarme">Registrarme</a>
      </div>
  </div>
</div>
